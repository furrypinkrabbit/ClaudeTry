<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="玉锤">
  <rect width="128" height="128" fill="#F2E5C8"/>
  <circle cx="64" cy="64" r="52" fill="none" stroke="#C9A24C" stroke-width="2" stroke-dasharray="2 2" opacity="0.7"/>
  <g transform="translate(64 64) rotate(-30)">
    <rect x="-40" y="-4" width="60" height="8" rx="2" fill="#B8352F" stroke="#1C1A17" stroke-width="2"/>
    <g stroke="#C9A24C" stroke-width="1.2" opacity="0.9">
      <line x1="-34" y1="-4" x2="-30" y2="4"/>
      <line x1="-22" y1="-4" x2="-18" y2="4"/>
      <line x1="-10" y1="-4" x2="-6" y2="4"/>
