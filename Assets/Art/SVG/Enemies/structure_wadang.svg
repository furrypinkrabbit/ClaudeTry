<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="裂瓦当">
  <rect width="128" height="128" fill="#F2E5C8"/>
  <!-- 圆形瓦当，中心图案是云锷纹 -->
  <g stroke="#1C1A17" stroke-width="2">
    <circle cx="64" cy="62" r="36" fill="#3E5C76"/>
    <circle cx="64" cy="62" r="30" fill="none" stroke="#C9A24C" stroke-width="1.5"/>
  </g>
  <!-- 云纹 -->
  <g fill="#C9A24C" stroke="#1C1A17" stroke-width="1">
    <path d="M54 56 q4 -8 14 -6 q10 2 8 10 q-2 8 -10 6 q-8 -2 -12 -10 Z"/>
    <path d="M66 70 q4 -6 12 -4 q8 2 6 8 q-2 6 -8 4 q-6 -2 -10 -8 Z" opacity="0.9"/>
  </g>
  <!-- 断裂 -->
  <g stroke="#7A1E12" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M32 44 L46 56 L40 60"/>
    <path d="M96 80 L84 70 L90 66"/>
  </g>
  <!-- 缺角 -->
  <path d="M92 34 L100 44 L82 38 Z" fill="#F2E5C8" stroke="#1C1A17" stroke-dasharray="2 2"/>
  <g fill="#1C1A17">
    <circle cx="52" cy="60" r="2"/>
    <circle cx="76" cy="60" r="2"/>
  </g>
  <text x="64" y="116" text-anchor="middle" font-family="'Ma Shan Zheng','STKaiti',serif" font-size="11" fill="#7A1E12">裂瓦当</text>
</svg>
