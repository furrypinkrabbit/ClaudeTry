<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="残缺斗拱">
  <rect width="128" height="128" fill="#F2E5C8"/>
  <!-- 斗：梁上方块 -->
  <g stroke="#1C1A17" stroke-width="2" stroke-linejoin="miter">
    <rect x="20"  y="88" width="88" height="10" fill="#8A5A2B"/>
    <rect x="48"  y="68" width="32" height="20" fill="#B8352F"/>
    <!-- 拱：上方横木，断裂 -->
    <path d="M12 60 L58 60 L62 68 L66 68 L70 60 L116 60 L116 56 L70 56 L66 64 L62 64 L58 56 L12 56 Z" fill="#A06C3B"/>
    <!-- 缺失一块 -->
    <path d="M78 56 L90 56 L86 60 L78 60 Z" fill="#F2E5C8" stroke-dasharray="2 2"/>
    <!-- 裂文 -->
    <path d="M30 56 L34 64 L38 60" fill="none"/>
  </g>
  <!-- 鸟颛 矐 -->
  <g fill="#1C1A17">
    <circle cx="56" cy="78" r="2.5"/>
    <circle cx="72" cy="78" r="2.5"/>
  </g>
  <!-- 骨架目形：残缺感 -->
  <path d="M52 86 q6 6 12 0 q6 6 12 0" fill="none" stroke="#7A1E12" stroke-width="2"/>
  <text x="64" y="116" text-anchor="middle" font-family="'Ma Shan Zheng','STKaiti',serif" font-size="11" fill="#7A1E12">残斗拱</text>
</svg>
