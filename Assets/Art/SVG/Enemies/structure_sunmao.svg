<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="断榫卯">
  <rect width="128" height="128" fill="#F2E5C8"/>
  <!-- 榫卯插接，两木未合 -->
  <g stroke="#1C1A17" stroke-width="2">
    <rect x="20" y="50" width="46" height="28" fill="#A06C3B"/>
    <!-- 榫頭 -->
    <rect x="66" y="58" width="8"  height="12" fill="#8A5A2B"/>
    <!-- 另一树 -->
    <rect x="78" y="50" width="30" height="28" fill="#A06C3B"/>
    <!-- 卯眼 -->
    <rect x="80" y="58" width="6"  height="12" fill="#F2E5C8"/>
    <!-- 碎片 -->
    <polygon points="74,44 78,40 82,46 78,50" fill="#7A1E12"/>
    <polygon points="70,84 66,90 74,90"        fill="#7A1E12"/>
  </g>
  <!-- 眼睛 -->
  <g fill="#1C1A17">
    <circle cx="36" cy="62" r="2.5"/>
    <circle cx="48" cy="62" r="2.5"/>
    <circle cx="94" cy="62" r="2.5"/>
  </g>
  <path d="M34 70 q6 4 14 0" fill="none" stroke="#7A1E12" stroke-width="2"/>
  <!-- 粗缺纹 -->
  <g stroke="#1C1A17" stroke-width="1" opacity="0.5">
    <line x1="26" y1="56" x2="30" y2="72"/>
    <line x1="56" y1="56" x2="58" y2="72"/>
  </g>
  <text x="64" y="116" text-anchor="middle" font-family="'Ma Shan Zheng','STKaiti',serif" font-size="11" fill="#7A1E12">断榫卯</text>
</svg>
