<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="殿内大厅">
  <rect width="128" height="128" fill="#F2E5C8"/>
  <g stroke="#1C1A17" stroke-width="2">
    <rect x="10" y="20" width="108" height="88" fill="#E8D1A2"/>
    <!-- 中央中堂 -->
    <rect x="46" y="44" width="36" height="46" fill="#B8352F"/>
    <!-- 供案 -->
    <rect x="50" y="56" width="28" height="8" fill="#C9A24C"/>
    <!-- 棁柱四周 -->
    <g fill="#1C1A17">
      <rect x="22" y="34" width="6" height="6"/>
      <rect x="100" y="34" width="6" height="6"/>
      <rect x="22" y="92" width="6" height="6"/>
      <rect x="100" y="92" width="6" height="6"/>
    </g>
    <g fill="#3E5C76" opacity="0.8">
      <rect x="22" y="40" width="6" height="52"/>
      <rect x="100" y="40" width="6" height="52"/>
    </g>
    <!-- 地砖对称 -->
    <g stroke="#1C1A17" stroke-width="0.5" opacity="0.35">
      <line x1="28" y1="64" x2="46" y2="64"/>
      <line x1="82" y1="64" x2="100" y2="64"/>
      <line x1="64" y1="20" x2="64" y2="108" stroke-dasharray="2 3"/>
    </g>
  </g>
  <text x="64" y="120" text-anchor="middle" font-family="'Ma Shan Zheng','STKaiti',serif" font-size="11" fill="#1C1A17">殿内大厅</text>
</svg>
