<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-label="HUD 框">
  <defs>
    <pattern id="hudpaper" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#F2E5C8"/>
      <path d="M0 6 L6 0" stroke="#E0C98F" stroke-width="0.6"/>
    </pattern>
  </defs>
  <!-- 外框 -->
  <rect x="4" y="4" width="312" height="72" fill="url(#hudpaper)" stroke="#1C1A17" stroke-width="2" rx="4"/>
  <rect x="8" y="8" width="304" height="64" fill="none" stroke="#B8352F" stroke-width="1" stroke-dasharray="3 2"/>
  <!-- 血槽 -->
  <g>
    <rect x="16" y="16" width="160" height="14" fill="#E8D1A2" stroke="#1C1A17"/>
    <rect x="16" y="16" width="120" height="14" fill="#B8352F"/>
    <text x="96"  y="26" text-anchor="middle" font-family="monospace" font-size="10" fill="#F2E5C8">80 / 100</text>
  </g>
  <!-- 手艺槽 -->
  <g>
    <rect x="16" y="36" width="160" height="10" fill="#E8D1A2" stroke="#1C1A17"/>
    <rect x="16" y="36" width="72"  height="10" fill="#C9A24C"/>
  </g>
  <!-- 槽位图标 -->
  <g stroke="#1C1A17" stroke-width="1.5">
    <rect x="200" y="14" width="40" height="40" fill="#F2E5C8"/>
    <rect x="248" y="14" width="40" height="40" fill="#F2E5C8"/>
  </g>
  <g font-family="'Ma Shan Zheng','STKaiti',serif" font-size="10" fill="#1C1A17">
    <text x="220" y="68" text-anchor="middle">锤</text>
    <text x="268" y="68" text-anchor="middle">凿</text>
  </g>
</svg>
